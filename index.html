<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>フロントエンドクイズ</title>
	<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
	<header>
		<div class="logo"><img src="assets/images/logo.png" alt=""></div>
	</header>
	<main>
		<article>
			<section id="quiz" class="container">
				<h1>フロントエンドクイズ</h1>
				<p id="progress">1 / 5</p>
				<h2 id="question">ここに問題文が表示されます</h2>
				<div id="choices">
					<label class="choice"><input type="radio" name="op" id="">選択肢1</label>
					<label class="choice"><input type="radio" name="op" id="">選択肢2</label>
					<label class="choice"><input type="radio" name="op" id="">選択肢3</label>
				</div>
				<p id="result">⚪︎正解！</p>
				<button type="button" id="nextBtn">次へ</button>
			</section>
		</article>
	</main>
</body>
</html>
